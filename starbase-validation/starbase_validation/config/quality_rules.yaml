# Quality gates configuration for starbase validation
# Based on quality_issues_inventory.md

quality_gates:
  taxonomy:
    max_missing_species: 5%
    max_missing_strain: 10%
    require_genus: true
    require_strain: false

  genome:
    max_missing_assembly: 10%
    require_taxonomy_link: true

  classification:
    max_missing_family: 0%   # BLOCKING - 0% allowed

  sequences:
    min_length: 5000
    max_length: 300000

blocking_issues:
  - missing_family
  - orphaned_foreign_keys
  - duplicate_accessions
  - broken_genome_taxonomy
  - ship_id_mismatches

warning_issues:
  - missing_strain
  - missing_biosample
  - missing_assembly
  - orphaned_taxonomy
  - duplicate_taxonomy
  - ships_missing_from_joined_ships
  - orphaned_accessions
  - invalid_feature_coordinates
  - orphaned_features
  - invalid_gff_coordinates
  - broken_captain_links
  - duplicate_ship_sequences
  - missing_taxonomy
  - incomplete_taxonomy
  - missing_navis
  - missing_haplotype
  - missing_sequence
  - missing_boundaries
  - short_sequence
  - long_sequence
  - duplicate_sequence
